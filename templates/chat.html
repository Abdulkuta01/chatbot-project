<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chat</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* DESKTOP FIX */
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0b141a;
}

/* MAIN APP WRAPPER */
.app-container {
    width: 95%;
    max-width: 1200px;
    height: 95vh;
    display: flex;
    background: #efeae2;
    border-radius: 10px;
    overflow: hidden;
}

/* LEFT SIDEBAR (WhatsApp style) */
.sidebar {
width: 30%;
background: #111b21;
color: white;
padding: 20px;
}

.sidebar h2 {
margin-bottom: 20px;
}

/* CHAT AREA */
.chat-container {
width: 70%;
display: flex;
flex-direction: column;
background: #efeae2;
}

/* HEADER */
.chat-header {
background: #202c33;
color: white;
padding: 25px;
font-weight: bold;
}

/* MESSAGES */
.chat-box {
flex: 1;
padding: 15px;
overflow-y: auto;
}

/* MESSAGE STYLE */
.message {
margin: 10px 0;
padding: 10px 15px;
border-radius: 10px;
max-width: 60%;
}

.user {
background: #d9fdd3;
margin-left: auto;
}

.bot {
background: white;
margin-right: auto;
}

/* INPUT AREA */
.chat-input {
display: flex;
padding: 10px;
background: #202c33;
}

.chat-input input {
flex: 1;
padding: 10px;
border-radius: 20px;
border: none;
outline: none;
}

.chat-input button {
margin-left: 10px;
padding: 10px 20px;
border: none;
border-radius: 20px;
background: #00a884;
color: white;
cursor: pointer;
} 

/* 📱 MOBILE RESPONSIVENESS */
@media screen and (max-width: 768px) {
body {
        align-items: stretch;
    }

    .app-container {
        width: 70%;
        height: 100vh;
        border-radius: 0;
    }

    .sidebar {
        display: none;
    }

    .chat-container {
        width: 100%;
    }
}

    .sidebar {
    width: 30%;
    min-width: 250px;
}

.chat-container {
    width: 100%;
}

    .chat-header {
        text-align: center;
        font-size: 16px;
    }

    .chat-box {
        padding: 10px;
    }

    .message {
    max-width: 55%;
    word-wrap: break-word;
}

    .chat-input {
        padding: 8px;
    }

    .chat-input input {
        font-size: 14px;
        padding: 8px;
    }

    .chat-input button {
        padding: 8px 12px;
        font-size: 14px;
    }


.chat-box {
    scroll-behavior: smooth;
}

</style>

</head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
    var chatBox = document.querySelector('.chat-box');
    chatBox.scrollTop = chatBox.scrollHeight;
</script>

<body>

    <div class="app-container">
    <!-- sidebar + chat-container go here -->

<!-- SIDEBAR -->

<div class="sidebar">
    <h2>Chats</h2>
    <p>Student Support Bot</p>
</div>

<!-- CHAT AREA -->

<div class="chat-container">

```
<div class="chat-header">
    <span>Student Assistant</span>

```
<div style="float: right;">
    <a href="/admin" style="color:white; margin-right:15px;">Admin</a>
    <a href="/logout" style="color:white;">Logout</a>
</div>
```

</div>


<div class="chat-box">
    {% for sender, message, time in chats %}
        <div class="message {{ sender }}">
            {{ message }}
        </div>
    {% endfor %}
</div>

<form method="POST" class="chat-input">
    <input type="text" name="message" placeholder="Type a message..." required>
    <button type="submit">Send</button>
</form>
```

</div>
</div>

</body>
</html>
